# DuckDB file path: use COMPTE_B_DUCKDB_PATH (set by compte_b.defs.project when Dagster loads) or export
# it yourself, e.g. `export COMPTE_B_DUCKDB_PATH="$PWD/data/compte_b.duckdb"` from `compte_b/`.
analysis:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('COMPTE_B_DUCKDB_PATH') }}"
      schema: main
      threads: 4
