version: 2

models:
  - name: stg_classed_data
    description: >
      Incremental table: on full refresh, loads all rows from source classed_data (excluding Bilan Mensuel)
      plus eligible rows from SQLite partage (dates after max classed date, older than 3 days from today).
      On incremental runs, only new partage rows are appended (watermark = max Date already in this table).
      Re-run with --full-refresh on this model when classed_data must be re-hydrated from the source.
    columns:
      - name: "Type"
        description: "Type of operation"
        tests:
          - not_null
      - name: "Date"
        description: "Date of the operation"
        tests:
          - not_null
      - name: "Libellé"
        description: "Libellé of the operation"
        tests:
          - not_null
      - name: "Montant"
        description: "Montant of the operation in euros"
        tests:
          - not_null

  - name: stg_operations
    description: Data from the import csv files
    columns:
      - name: "date"
        description: "Date of the operation"
        tests:
          - not_null
      - name: "libelle"
        description: "Libellé of the operation"
        tests:
          - not_null
      - name: "montant_euros"
        description: "Montant of the operation in euros"
        tests:
          - not_null
